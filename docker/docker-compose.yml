services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: hnsearch-postgres
    environment:
      POSTGRES_USER: hnsearch
      POSTGRES_PASSWORD: hnsearch
      POSTGRES_DB: hnsearch
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hnsearch -d hnsearch"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  pgdata:
